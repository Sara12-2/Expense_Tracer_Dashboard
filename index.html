<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURUM — Finance Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root {
  --bg: #f0f4fa;
  --surface: #ffffff;
  --surface2: #f7f9fc;
  --border: #e4eaf5;
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --accent: #2563eb;
  --accent2: #0ea5e9;
  --green: #10b981;
  --red: #ef4444;
  --amber: #f59e0b;
  --purple: #8b5cf6;
  --sidebar-bg: #0c1322;
  --sidebar-text: #7e9bb5;
  --sidebar-active: #2563eb;
  --card-shadow: 0 2px 16px rgba(15,23,42,0.07);
  --radius: 20px;
  --radius-sm: 12px;
}

body.dark {
  --bg: #080d18;
  --surface: #0f1728;
  --surface2: #141e30;
  --border: #1e2d45;
  --text: #e8f0fe;
  --text2: #7ea8d8;
  --text3: #3d5a80;
  --accent: #3b82f6;
  --accent2: #38bdf8;
  --green: #34d399;
  --red: #f87171;
  --amber: #fbbf24;
  --purple: #a78bfa;
  --sidebar-bg: #060b14;
  --sidebar-text: #4d6b8a;
  --sidebar-active: #3b82f6;
  --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* Animations */
@keyframes slideIn {
  from { transform: translateX(80px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

@keyframes shimmer {
  0% { background-position: -1000px 0; }
  100% { background-position: 1000px 0; }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* Loading State */
.loading {
  position: relative;
  opacity: 0.6;
  pointer-events: none;
}

.loading::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 30px;
  height: 30px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  transform: translate(-50%, -50%);
}

/* Toast */
.toast-container {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  display: flex; flex-direction: column; gap: 10px;
}
.toast {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 12px 20px; border-radius: var(--radius-sm);
  box-shadow: var(--card-shadow); font-size: 14px; font-weight: 500;
  animation: slideIn 0.3s ease; max-width: 300px;
}
.toast.success { border-left: 4px solid var(--green); }
.toast.error { border-left: 4px solid var(--red); }
.toast.info { border-left: 4px solid var(--accent); }
.toast.warning { border-left: 4px solid var(--amber); }

/* LAYOUT */
.app { display: flex; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: 260px; background: var(--sidebar-bg);
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
  transition: all 0.3s; display: flex; flex-direction: column;
  border-right: 1px solid rgba(59,130,246,0.12);
}
.logo {
  padding: 28px 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 16px;
}
.logo h1 {
  font-family: 'Outfit', sans-serif;
  font-size: 1.6rem; font-weight: 800;
  background: linear-gradient(135deg, #fff 30%, #60a5fa);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  display: flex; align-items: center; gap: 10px;
}
.logo .gem { color: #60a5fa; }
.logo-sub { font-size: 11px; color: var(--sidebar-text); margin-top: 2px; letter-spacing: 2px; text-transform: uppercase; }

.nav-section { padding: 8px 12px; }
.nav-section-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
  color: rgba(126,155,181,0.5); padding: 8px 12px 4px; font-weight: 600;
}
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px; border-radius: var(--radius-sm);
  color: var(--sidebar-text); font-weight: 500; font-size: 14px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer; margin-bottom: 2px;
  position: relative;
  overflow: hidden;
}
.nav-item::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition: left 0.5s;
}
.nav-item:hover::before {
  left: 100%;
}
.nav-item i { width: 20px; font-size: 1rem; text-align: center; transition: transform 0.3s; }
.nav-item:hover i { transform: translateX(3px); }
.nav-item:hover { background: rgba(59,130,246,0.12); color: #a8c8f8; }
.nav-item.active {
  background: linear-gradient(95deg, rgba(37,99,235,0.25), rgba(14,165,233,0.12));
  color: #fff;
  animation: fadeIn 0.3s ease;
}
.nav-item.active i { color: #60a5fa; }

.sidebar-footer {
  margin-top: auto; padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.user-pill {
  display: flex; align-items: center; gap: 12px;
  background: rgba(255,255,255,0.05); border-radius: var(--radius-sm);
  padding: 10px 14px; cursor: pointer;
  transition: all 0.3s;
}
.user-pill:hover {
  background: rgba(255,255,255,0.1);
  transform: translateX(3px);
}
.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, #2563eb, #06b6d4);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; color: white; font-size: 14px; flex-shrink: 0;
  transition: transform 0.3s;
}
.user-pill:hover .avatar {
  transform: scale(1.05);
}
.user-info .name { font-size: 13px; color: #c0d4ee; font-weight: 600; }
.user-info .role { font-size: 11px; color: var(--sidebar-text); }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* TOPBAR */
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 28px; display: flex; align-items: center;
  gap: 16px; position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
  transition: background 0.3s, border-color 0.3s;
}
.topbar-title {
  font-family: 'Outfit', sans-serif; font-size: 1.05rem;
  font-weight: 700; color: var(--text); margin-right: auto; white-space: nowrap;
}
.search {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 40px; padding: 9px 18px; width: 240px; transition: all 0.3s;
}
.search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); transform: scale(1.02); }
.search input { border: none; outline: none; background: transparent; font-size: 13px; color: var(--text); width: 100%; }
.search input::placeholder { color: var(--text3); }
.search i { color: var(--text3); font-size: 13px; transition: color 0.3s; }
.search:focus-within i { color: var(--accent); }
.date-pill {
  background: var(--surface2); border: 1px solid var(--border);
  padding: 8px 16px; border-radius: 40px; font-size: 13px;
  font-weight: 600; color: var(--text2); white-space: nowrap;
  transition: all 0.3s;
}
.date-pill:hover {
  transform: translateY(-2px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.currency-select {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); padding: 8px 14px; border-radius: 40px;
  font-size: 13px; font-weight: 600; cursor: pointer; outline: none;
  font-family: inherit; transition: all 0.3s;
}
.currency-select:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
}
.dark-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); padding: 9px 18px; border-radius: 40px;
  font-size: 13px; font-weight: 600; cursor: pointer; display: flex;
  align-items: center; gap: 8px; transition: all 0.3s; font-family: inherit;
}
.dark-btn:hover { background: var(--accent); color: white; border-color: var(--accent); transform: translateY(-2px); }
.dark-btn:active { transform: scale(0.98); }

/* CONTENT */
.content { padding: 28px; flex: 1; overflow-y: auto; animation: fadeIn 0.4s ease; }

/* PAGE HEADER */
.page-header { margin-bottom: 24px; animation: slideUp 0.4s ease; }
.page-header h2 {
  font-family: 'Outfit', sans-serif; font-size: 1.45rem;
  font-weight: 700; color: var(--text);
}
.page-header p { color: var(--text2); font-size: 14px; margin-top: 4px; }

/* CARDS */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 22px;
  box-shadow: var(--card-shadow); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  animation: fadeIn 0.5s ease;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.15);
}
.card-title {
  font-size: 13px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text2); margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.card-title i { color: var(--accent); transition: transform 0.3s; }
.card:hover .card-title i { transform: rotate(360deg); }

/* KPI GRID */
.kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(180px,1fr)); gap: 18px; margin-bottom: 24px; }
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 22px 20px 20px;
  box-shadow: var(--card-shadow); cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative; overflow: visible; min-width: 0;
  animation: fadeIn 0.4s ease;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity: 0; transition: opacity 0.3s;
}
.kpi-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
.kpi-card:hover::before { opacity: 1; }
.kpi-card:active { transform: translateY(-2px) scale(0.98); }
.kpi-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); }
.kpi-value {
  font-family: 'Outfit', sans-serif; font-size: 1.5rem;
  font-weight: 700; color: var(--text); margin: 6px 0 4px;
  line-height: 1.15; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; letter-spacing: -0.5px; padding-right: 54px;
}
.kpi-meta { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
.kpi-icon {
  position: absolute; top: 18px; right: 18px;
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: transform 0.3s;
}
.kpi-card:hover .kpi-icon { transform: rotate(15deg) scale(1.1); }

/* GRID LAYOUTS */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.col-7-5 { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 24px; }

/* TABLE */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left; padding: 10px 12px; font-size: 11px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text3); border-bottom: 1px solid var(--border);
}
tbody tr { border-bottom: 1px solid var(--border); transition: all 0.3s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); transform: translateX(5px); }
tbody td { padding: 13px 12px; font-size: 14px; color: var(--text); vertical-align: middle; }

.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700;
  transition: all 0.3s;
}
.badge-income { background: rgba(16,185,129,0.12); color: var(--green); }
.badge-expense { background: rgba(239,68,68,0.1); color: var(--red); }

.action-btn {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  padding: 5px 10px; cursor: pointer; font-size: 12px; color: var(--text2);
  transition: all 0.3s; font-family: inherit;
}
.action-btn:hover { background: var(--accent); color: white; border-color: var(--accent); transform: translateY(-2px); }
.action-btn:active { transform: scale(0.95); }
.action-btn.del:hover { background: var(--red); border-color: var(--red); color: white; }

/* Filter Chips */
.filter-chip {
  padding: 8px 16px;
  border-radius: 40px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.3s;
  font-size: 13px;
  font-weight: 600;
}
.filter-chip:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  color: var(--accent);
}
.filter-chip.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

/* FORMS */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; display: block; }
.form-input, .form-select {
  width: 100%; padding: 11px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-family: inherit; font-size: 14px;
  transition: all 0.3s; outline: none;
}
.form-input:focus, .form-select:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  transform: scale(1.01);
}
.form-input.error { border-color: var(--red); animation: pulse 0.5s; }

.btn {
  width: 100%; padding: 13px; border-radius: 40px; border: none;
  font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 14px;
  cursor: pointer; transition: all 0.3s; letter-spacing: 0.5px;
  position: relative;
  overflow: hidden;
}
.btn::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
}
.btn:active::before {
  width: 300px;
  height: 300px;
}
.btn-primary {
  background: linear-gradient(95deg, #2563eb, #0ea5e9); color: white;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,99,235,0.35); }
.btn-primary:active { transform: scale(0.98); }

/* PROGRESS */
.progress-bar { background: var(--border); border-radius: 99px; height: 8px; overflow: hidden; margin: 6px 0 4px; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

/* BUDGET LIST */
.budget-item { margin-bottom: 18px; animation: fadeIn 0.3s ease; }
.budget-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.budget-name { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
.budget-amounts { font-size: 12px; color: var(--text3); }
.budget-pct { font-size: 11px; font-weight: 700; }

/* CATEGORY CARDS */
.cat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
.cat-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 16px; text-align: center;
  cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  animation: fadeIn 0.4s ease;
}
.cat-card:hover { transform: translateY(-5px) scale(1.05); background: var(--surface); border-color: var(--accent); }
.cat-card:active { transform: translateY(-2px) scale(0.98); }
.cat-icon { font-size: 1.6rem; margin-bottom: 8px; line-height: 1; transition: transform 0.3s; }
.cat-card:hover .cat-icon { transform: scale(1.2); }
.cat-name { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
.cat-amount { font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700; color: var(--text); margin-top: 4px; }
.cat-pct { font-size: 11px; color: var(--text3); }

/* INSIGHT CARDS */
.insight-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 20px; }
.insight-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 20px; text-align: center;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
  animation: fadeIn 0.4s ease;
}
.insight-card:hover { transform: translateY(-5px) scale(1.03); background: var(--surface); border-color: var(--accent); }
.insight-card:active { transform: translateY(-2px); }
.insight-icon { font-size: 1.6rem; margin-bottom: 10px; transition: transform 0.3s; }
.insight-card:hover .insight-icon { transform: scale(1.2); }
.insight-label { font-size: 12px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
.insight-value { font-family: 'Outfit', sans-serif; font-size: 1.35rem; font-weight: 700; color: var(--text); margin: 4px 0; }
.insight-sub { font-size: 12px; color: var(--text3); }

/* ANALYTICS PAGE */
.analytics-stat {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 16px 20px;
  display: flex; align-items: center; gap: 16px;
  transition: all 0.3s;
  animation: fadeIn 0.4s ease;
}
.analytics-stat:hover {
  transform: translateY(-3px);
  background: var(--surface);
  border-color: var(--accent);
}
.analytics-stat-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; flex-shrink: 0;
  transition: transform 0.3s;
}
.analytics-stat:hover .analytics-stat-icon { transform: rotate(10deg) scale(1.1); }
.analytics-stat-label { font-size: 12px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
.analytics-stat-value { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--text); margin-top: 2px; }

/* SETTINGS */
.settings-section { margin-bottom: 28px; }
.settings-title { font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0; border-bottom: 1px solid var(--border);
  transition: all 0.3s;
}
.settings-row:hover {
  transform: translateX(5px);
  background: var(--surface2);
  padding-left: 10px;
  border-radius: 8px;
}
.settings-row:last-child { border-bottom: none; }
.settings-row-label { font-size: 14px; font-weight: 500; color: var(--text); }
.settings-row-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.toggle {
  width: 44px; height: 24px; border-radius: 99px; background: var(--border);
  cursor: pointer; position: relative; transition: all 0.3s; flex-shrink: 0;
}
.toggle.on { background: var(--accent); }
.toggle::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 18px; height: 18px; border-radius: 50%; background: white;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.toggle.on::after { transform: translateX(20px); }
.toggle:hover { transform: scale(1.05); }
.toggle:active { transform: scale(0.95); }

/* EMPTY STATE */
.empty-state {
  text-align: center; padding: 48px 20px; color: var(--text3);
}
.empty-state i { font-size: 3rem; margin-bottom: 12px; display: block; transition: transform 0.3s; }
.empty-state:hover i { transform: scale(1.1); }
.empty-state p { font-size: 14px; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 9000; backdrop-filter: blur(4px);
  animation: fadeIn 0.2s ease;
}
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 28px; width: 440px;
  max-width: 95vw; box-shadow: 0 24px 64px rgba(0,0,0,0.3);
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-header h3 { font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); }
.modal-close { background: none; border: none; color: var(--text3); font-size: 1.2rem; cursor: pointer; padding: 4px; transition: all 0.3s; }
.modal-close:hover { color: var(--text); transform: rotate(90deg); }

/* REPORTS */
.report-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 20px;
  display: flex; align-items: flex-start; gap: 16px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
  animation: fadeIn 0.4s ease;
}
.report-card:hover { transform: translateY(-5px) translateX(5px); border-color: var(--accent); background: var(--surface); }
.report-card:active { transform: translateY(-2px); }
.report-icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; flex-shrink: 0;
  transition: transform 0.3s;
}
.report-card:hover .report-icon { transform: rotate(10deg) scale(1.1); }
.report-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.report-desc { font-size: 12px; color: var(--text3); line-height: 1.5; }
.report-meta { font-size: 11px; color: var(--accent); margin-top: 6px; font-weight: 600; }

/* FOOTER */
.footer {
  padding: 18px 28px; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12px; color: var(--text3); background: var(--surface);
  flex-wrap: wrap; gap: 12px;
}
.footer-links { display: flex; gap: 20px; }
.footer-links i { font-size: 1rem; cursor: pointer; transition: all 0.3s; }
.footer-links i:hover { color: var(--accent); transform: translateY(-3px) scale(1.2); }

/* RESPONSIVE */
@media(max-width: 1100px) {
  .kpi-grid { grid-template-columns: repeat(2,1fr); }
  .grid-2, .col-7-5, .grid-3 { grid-template-columns: 1fr; }
  .sidebar { width: 72px; }
  .sidebar .logo h1 span, .sidebar .nav-item span,
  .sidebar .nav-section-label, .sidebar-footer .user-info,
  .logo-sub { display: none; }
  .nav-item { justify-content: center; padding: 12px; }
  .logo { padding: 20px 12px; }
  .logo h1 { justify-content: center; font-size: 1.2rem; }
  .user-pill { justify-content: center; }
  .cat-grid { grid-template-columns: repeat(2,1fr); }
  .insight-grid { grid-template-columns: 1fr 1fr; }
}
@media(max-width: 700px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .topbar { padding: 12px 16px; }
  .content { padding: 16px; }
  .search { width: 160px; }
  .date-pill { display: none; }
  .insight-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <h1 style="overflow:hidden;"><i class="fa-solid fa-gem" style="color:#60a5fa;margin-right:8px;"></i><span style="letter-spacing:2px;">AURUM</span></h1>
      <div class="logo-sub">Finance Suite v2</div>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Main</div>
      <div class="nav-item active" data-nav="dashboard"><i class="fa-solid fa-chart-line"></i> <span>Dashboard</span></div>
      <div class="nav-item" data-nav="transactions"><i class="fa-solid fa-exchange-alt"></i> <span>Transactions</span></div>
      <div class="nav-item" data-nav="analytics"><i class="fa-solid fa-chart-pie"></i> <span>Analytics</span></div>
      <div class="nav-item" data-nav="budgets"><i class="fa-solid fa-wallet"></i> <span>Budgets</span></div>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Other</div>
      <div class="nav-item" data-nav="reports"><i class="fa-solid fa-file-alt"></i> <span>Reports</span></div>

        <div class="user-info">

  <!-- MAIN -->
  <div class="main">

      <div class="search">

      <div class="date-pill" id="datePill"></div>
      <select class="currency-select" id="currencySelect">
        <option value="$">$ USD</option>
        <option value="€">€ EUR</option>
        <option value="£">£ GBP</option>
        <option value="₹">₹ INR</option>
        <option value="¥">¥ JPY</option>
      </select>
      <button class="dark-btn" id="darkBtn"><i class="fa-solid fa-moon"></i> <span id="darkBtnText">Dark</span></button>
    </div>

    <div class="content" id="content"></div>

    <div class="footer">
      <span>© 2025 AURUM Finance Suite — All rights reserved</span>
      <div class="footer-links">
        <i class="fab fa-twitter"></i>
        <i class="fab fa-linkedin"></i>
        <i class="fab fa-github"></i>
        <i class="fab fa-dribbble"></i>
      </div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <h3><i class="fa-solid fa-edit"></i> Edit Transaction</h3>
      <button class="modal-close" id="modalClose"><i class="fa-solid fa-times"></i></button>
    </div>
    <div class="form-group"><label class="form-label">Title</label><input type="text" class="form-input" id="editTitle"></div>
    <div class="form-group"><label class="form-label">Amount</label><input type="number" class="form-input" id="editAmount"></div>
    <div class="form-group"><label class="form-label">Category</label>
      <select class="form-select" id="editCategory">
        <option>Food</option><option>Shopping</option><option>Bills</option>
        <option>Transport</option><option>Entertainment</option><option>Health</option><option>Income</option><option>Other</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Date</label><input type="date" class="form-input" id="editDate"></div>
    <div class="form-group"><label class="form-label">Type</label>
      <select class="form-select" id="editType">
        <option value="expense">Expense</option><option value="income">Income</option>
      </select>
    </div>
    <button class="btn btn-primary" id="saveEditBtn">Save Changes</button>
  </div>
</div>

<script>
// ============================================================
// STATE & STORAGE
// ============================================================
const STORAGE_KEYS = { txns: 'aurum_transactions', settings: 'aurum_settings', categories: 'aurum_categories' };

const DEFAULT_TXNS = [
  { id: uid(), title: 'Salary March', amount: 6800, category: 'Income', date: '2025-03-01', type: 'income' },
  { id: uid(), title: 'Whole Foods', amount: 420, category: 'Food', date: '2025-03-02', type: 'expense' },
  { id: uid(), title: 'Uber Rides', amount: 85, category: 'Transport', date: '2025-03-04', type: 'expense' },
  { id: uid(), title: 'Zara Shopping', amount: 320, category: 'Shopping', date: '2025-03-06', type: 'expense' },
  { id: uid(), title: 'Electricity Bill', amount: 145, category: 'Bills', date: '2025-03-08', type: 'expense' },
  { id: uid(), title: 'Netflix + Spotify', amount: 38, category: 'Entertainment', date: '2025-03-10', type: 'expense' },
  { id: uid(), title: 'Freelance UX', amount: 2400, category: 'Income', date: '2025-03-12', type: 'income' },
  { id: uid(), title: 'Michelin Dinner', amount: 190, category: 'Food', date: '2025-03-15', type: 'expense' },
  { id: uid(), title: 'Apple Products', amount: 299, category: 'Shopping', date: '2025-03-18', type: 'expense' },
  { id: uid(), title: 'Gym Annual', amount: 120, category: 'Health', date: '2025-03-20', type: 'expense' },
  { id: uid(), title: 'Dividend Payout', amount: 350, category: 'Income', date: '2025-03-22', type: 'income' },
];

const BUDGETS = [
  { category: 'Food', limit: 700 }, { category: 'Shopping', limit: 500 },
  { category: 'Bills', limit: 350 }, { category: 'Transport', limit: 200 },
  { category: 'Entertainment', limit: 180 }, { category: 'Health', limit: 250 },
];

const CAT_ICONS = {
  Food: '<i class="fa-solid fa-utensils" style="color:#f59e0b;"></i>',
  Shopping: '<i class="fa-solid fa-cart-shopping" style="color:#8b5cf6;"></i>',
  Bills: '<i class="fa-solid fa-bolt" style="color:#ef4444;"></i>',
  Transport: '<i class="fa-solid fa-car" style="color:#3b82f6;"></i>',
  Entertainment: '<i class="fa-solid fa-film" style="color:#ec4899;"></i>',
  Health: '<i class="fa-solid fa-heart-pulse" style="color:#10b981;"></i>',
  Income: '<i class="fa-solid fa-coins" style="color:#0ea5e9;"></i>',
  Other: '<i class="fa-solid fa-box" style="color:#94a3b8;"></i>'
};
const CAT_COLORS = { Food:'#f59e0b', Shopping:'#8b5cf6', Bills:'#ef4444', Transport:'#3b82f6', Entertainment:'#ec4899', Health:'#10b981', Income:'#0ea5e9', Other:'#94a3b8' };

function uid() { return '_' + Math.random().toString(36).substr(2,9); }

let transactions = [];
let currency = '$';
let editingId = null;
let activeCharts = {};
let currentNav = 'dashboard';
let darkMode = false;
let searchTerm = '';
let currentTransactionFilter = 'all';
let customCategories = [];

function load() {
  const saved = localStorage.getItem(STORAGE_KEYS.txns);
  transactions = saved ? JSON.parse(saved) : DEFAULT_TXNS.map(t=>({...t, id: uid()}));
  const settings = JSON.parse(localStorage.getItem(STORAGE_KEYS.settings) || '{}');
  darkMode = settings.dark || false;
  currency = settings.currency || '$';
  customCategories = JSON.parse(localStorage.getItem(STORAGE_KEYS.categories) || '[]');
  if (darkMode) document.body.classList.add('dark');
  document.getElementById('currencySelect').value = currency;
  updateDarkBtn();
}

function save() {
  localStorage.setItem(STORAGE_KEYS.txns, JSON.stringify(transactions));
  localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify({ dark: darkMode, currency }));
  localStorage.setItem(STORAGE_KEYS.categories, JSON.stringify(customCategories));
}

// ============================================================
// HELPERS
// ============================================================
function fmt(n) { return currency + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function pct(a, b) { return b === 0 ? '0' : ((a/b)*100).toFixed(1); }

function animateNumber(element, start, end, duration = 1000) {
  const startTime = performance.now();
  const updateNumber = (currentTime) => {
    const elapsed = currentTime - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const easeOutCubic = 1 - Math.pow(1 - progress, 3);
    const current = start + (end - start) * easeOutCubic;
    if (element) element.textContent = fmt(current);
    if (progress < 1) requestAnimationFrame(updateNumber);
  };
  requestAnimationFrame(updateNumber);
}

function getKPIs() {
  let income = 0, expense = 0;
  transactions.forEach(t => t.type === 'income' ? income += t.amount : expense += t.amount);
  return { income, expense, balance: income - expense, savings: income - expense };
}

function getCatSpend() {
  const map = {};
  transactions.filter(t => t.type === 'expense').forEach(t => map[t.category] = (map[t.category]||0) + t.amount);
  return map;
}

function checkBudgetAlerts() {
  const catSpend = getCatSpend();
  BUDGETS.forEach(budget => {
    const spent = catSpend[budget.category] || 0;
    const percentage = (spent / budget.limit) * 100;
    
    if (percentage >= 90 && percentage < 100) {
      toast(`⚠️ ${budget.category} budget at ${percentage.toFixed(0)}%!`, 'warning');
    } else if (percentage >= 100) {
      toast(`❗ ${budget.category} budget exceeded!`, 'error');
    }
  });
}

function isDark() { return document.body.classList.contains('dark'); }
function chartColors() {
  return { text: isDark() ? '#7ea8d8' : '#475569', grid: isDark() ? '#1e2d45' : '#e4eaf5', bg: isDark() ? '#0f1728' : '#ffffff' };
}
function destroyCharts() {
  Object.values(activeCharts).forEach(c => { try { c.destroy(); } catch(e){} });
  activeCharts = {};
}

function toast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`; 
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => {
    t.style.animation = 'slideIn 0.3s ease reverse';
    setTimeout(() => t.remove(), 300);
  }, 3200);
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
    toast('Search activated', 'info');
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    e.preventDefault();
    showAddModal();
  }
  if (e.key === 'Escape') {
    document.getElementById('editModal').style.display = 'none';
  }
});

// ============================================================
// NAVIGATION
// ============================================================
const PAGE_TITLES = { dashboard:'Dashboard', transactions:'Transactions', analytics:'Analytics', budgets:'Budgets', reports:'Reports', settings:'Settings' };

document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    currentNav = el.dataset.nav;
    document.getElementById('pageTitle').textContent = PAGE_TITLES[currentNav];
    
    // Add ripple effect
    const ripple = document.createElement('span');
    ripple.style.position = 'absolute';
    ripple.style.borderRadius = '50%';
    ripple.style.backgroundColor = 'rgba(255,255,255,0.3';
    ripple.style.pointerEvents = 'none';
    ripple.style.transform = 'scale(0)';
    ripple.style.animation = 'ripple 0.6s linear';
    el.style.position = 'relative';
    el.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
    
    destroyCharts();
    render();
  });
});

function render() {
  const pages = { dashboard: renderDashboard, transactions: renderTransactions, analytics: renderAnalytics, budgets: renderBudgets, reports: renderReports, settings: renderSettings };
  (pages[currentNav] || renderDashboard)();
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard() {
  const kpis = getKPIs();
  const catSpend = getCatSpend();

  document.getElementById('content').innerHTML = `
    <div class="page-header">
      <h2>Welcome back, John 👋</h2>
      <p>Here's your financial overview for March 2025</p>
    </div>

    <div class="kpi-grid">
      ${kpiCard('Total Balance', fmt(kpis.balance), 'fa-wallet', 'rgba(37,99,235,0.12)', '#2563eb', '↑ 18% vs last month', '#10b981', kpis.balance)}
      ${kpiCard('Monthly Income', fmt(kpis.income), 'fa-arrow-up', 'rgba(16,185,129,0.12)', '#10b981', '+15% growth', '#10b981', kpis.income)}
      ${kpiCard('Total Expenses', fmt(kpis.expense), 'fa-arrow-down', 'rgba(239,68,68,0.1)', '#ef4444', '↓ 8% from last', '#ef4444', kpis.expense)}
      ${kpiCard('Net Savings', fmt(kpis.savings), 'fa-piggy-bank', 'rgba(139,92,246,0.12)', '#8b5cf6', pct(kpis.savings,kpis.income)+'% savings rate', '#8b5cf6', kpis.savings)}
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-chart-pie"></i> Income vs Expenses</div>
        <div style="position:relative;height:240px;"><canvas id="chartDonut" role="img" aria-label="Donut chart comparing income ${fmt(kpis.income)} vs expenses ${fmt(kpis.expense)}">Income: ${fmt(kpis.income)}, Expenses: ${fmt(kpis.expense)}</canvas></div>
      </div>
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-chart-pie"></i> Category Breakdown</div>
        <div style="position:relative;height:240px;"><canvas id="chartPie" role="img" aria-label="Pie chart of spending by category">Spending by category.</canvas></div>
      </div>
    </div>

    <div class="col-7-5">
      <div class="card">
        <div class="card-title" style="justify-content:space-between;">
          <span><i class="fa-solid fa-clock"></i> Recent Transactions</span>
          <span style="font-size:11px;color:var(--accent);cursor:pointer;" onclick="document.querySelector('[data-nav=transactions]').click()">View all →</span>
        </div>
        ${txnTable(transactions.slice(0,6), false)}
      </div>
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-plus-circle"></i> Quick Add</div>
        ${quickAddForm()}
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:24px;">
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-bullseye"></i> Budget Overview</div>
        ${budgetList()}
      </div>
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-table-cells"></i> Spending by Category</div>
        <div class="cat-grid">
          ${['Food','Shopping','Bills','Transport','Entertainment','Health'].map(c => {
            const s = catSpend[c]||0;
            const p = pct(s, kpis.expense);
            return `<div class="cat-card"><div class="cat-icon" style="font-size:1.4rem;">${CAT_ICONS[c]||'<i class=\"fa-solid fa-tag\"></i>'}</div><div class="cat-name">${c}</div><div class="cat-amount">${fmt(s)}</div><div class="cat-pct">${p}% of total</div></div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:24px;">
      <div class="card-title"><i class="fa-solid fa-lightbulb"></i> Financial Insights</div>
      <div class="insight-grid" id="insightGrid"></div>
    </div>
  `;

  buildInsights(kpis, catSpend);
  setTimeout(() => { 
    if (document.getElementById('chartDonut')) buildDonut(kpis); 
    if (document.getElementById('chartPie')) buildPie(catSpend); 
    setupQuickAdd(); 
  }, 50);
}

function kpiCard(label, value, icon, iconBg, iconColor, meta, metaColor, rawValue) {
  return `<div class="kpi-card" data-value="${rawValue}">
    <div class="kpi-icon" style="background:${iconBg};"><i class="fa-solid ${icon}" style="color:${iconColor};"></i></div>
    <div class="kpi-label">${label}</div>
    <div class="kpi-value">${value}</div>
    <div class="kpi-meta" style="color:${metaColor};"><i class="fa-solid fa-arrow-trend-up" style="font-size:10px;"></i> ${meta}</div>
  </div>`;
}

function buildInsights(kpis, catSpend) {
  let topCat = 'None', topVal = 0;
  for (const [k,v] of Object.entries(catSpend)) if (v > topVal) { topVal = v; topCat = k; }
  const sr = pct(kpis.savings, kpis.income);
  const avgDay = (kpis.expense / 30).toFixed(2);
  const grid = document.getElementById('insightGrid');
  if (!grid) return;
  grid.innerHTML = `
    <div class="insight-card"><div class="insight-icon">👑</div><div class="insight-label">Top Category</div><div class="insight-value">${topCat}</div><div class="insight-sub">${fmt(topVal)} spent</div></div>
    <div class="insight-card"><div class="insight-icon">📈</div><div class="insight-label">Savings Rate</div><div class="insight-value">${sr}%</div><div class="insight-sub">${parseFloat(sr)>20?'Excellent 🎯':'Needs improvement ⚠️'}</div></div>
    <div class="insight-card"><div class="insight-icon">📅</div><div class="insight-label">Daily Average</div><div class="insight-value">${currency}${avgDay}</div><div class="insight-sub">Monthly: ${fmt(kpis.expense)}</div></div>
  `;
}

function buildDonut(kpis) {
  const ctx = document.getElementById('chartDonut');
  if (!ctx || !ctx.getContext) return;
  const cc = chartColors();
  activeCharts.donut = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Income','Expenses'],
      datasets: [{ data: [kpis.income, kpis.expense], backgroundColor: ['#2563eb','#ef4444'], borderWidth: 0, hoverOffset: 6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '62%',
      plugins: { legend: { position:'bottom', labels:{ color: cc.text, font:{size:12}, padding:16 } } }
    }
  });
}

function buildPie(catSpend) {
  const ctx = document.getElementById('chartPie');
  if (!ctx || !ctx.getContext) return;
  const cc = chartColors();
  const keys = Object.keys(catSpend);
  if (!keys.length) return;
  activeCharts.pie = new Chart(ctx, {
    type: 'pie',
    data: {
      labels: keys,
      datasets: [{ data: keys.map(k=>catSpend[k]), backgroundColor: keys.map(k => CAT_COLORS[k]||'#94a3b8'), borderWidth: 0, hoverOffset: 6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position:'bottom', labels:{ color: cc.text, font:{size:11}, padding:12 } } }
    }
  });
}

// ============================================================
// TRANSACTIONS PAGE
// ============================================================
function renderTransactions() {
  let filtered = transactions;
  
  // Apply search filter
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    filtered = filtered.filter(t => t.title.toLowerCase().includes(q) || t.category.toLowerCase().includes(q));
  }
  
  // Apply type filter
  if (currentTransactionFilter === 'income') {
    filtered = filtered.filter(t => t.type === 'income');
  } else if (currentTransactionFilter === 'expense') {
    filtered = filtered.filter(t => t.type === 'expense');
  }

  document.getElementById('content').innerHTML = `
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;">
      <div><h2>Transactions</h2><p>${filtered.length} of ${transactions.length} transactions</p></div>
      <button class="btn btn-primary" style="width:auto;padding:11px 24px;font-size:14px;" id="addTxnBtn"><i class="fa-solid fa-plus"></i> Add New</button>
    </div>

    <div class="grid-3" style="margin-bottom:20px;">
      ${miniStat('Total Income', fmt(getKPIs().income), '#10b981')}
      ${miniStat('Total Expenses', fmt(getKPIs().expense), '#ef4444')}
      ${miniStat('Net Balance', fmt(getKPIs().balance), '#2563eb')}
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">

function bindTxnActions() {
  document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => openEditModal(btn.dataset.id)));
  document.querySelectorAll('.del-btn').forEach(btn => btn.addEventListener('click', () => deleteTransaction(btn.dataset.id)));
}

function deleteTransaction(id) {
  if (!confirm('Delete this transaction?')) return;
  transactions = transactions.filter(t => t.id !== id);
  save();
  toast('Transaction deleted', 'error');
  checkBudgetAlerts();
  render();
}

function openEditModal(id) {
  const t = transactions.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('editTitle').value = t.title;
  document.getElementById('editAmount').value = t.amount;
  document.getElementById('editCategory').value = t.category;
  document.getElementById('editDate').value = t.date;
  document.getElementById('editType').value = t.type;
  document.getElementById('editModal').style.display = 'flex';
  document.querySelector('.modal-header h3').innerHTML = '<i class="fa-solid fa-edit"></i> Edit Transaction';
  document.getElementById('saveEditBtn').textContent = 'Save Changes';
  
  // Remove existing listener and add new one
  const saveBtn = document.getElementById('saveEditBtn');
  const newSaveBtn = saveBtn.cloneNode(true);
  saveBtn.parentNode.replaceChild(newSaveBtn, saveBtn);
  
  newSaveBtn.addEventListener('click', function saveHandler() {
    const title = document.getElementById('editTitle').value.trim();
    const amount = parseFloat(document.getElementById('editAmount').value);
    const category = document.getElementById('editCategory').value;
    const date = document.getElementById('editDate').value;
    const type = document.getElementById('editType').value;
    if (!title || isNaN(amount) || amount <= 0 || !date) { toast('Please fill all fields correctly', 'error'); return; }
    const idx = transactions.findIndex(t => t.id === editingId);
    if (idx > -1) {
      transactions[idx] = { ...transactions[idx], title, amount, category, date, type };
      save();
      document.getElementById('editModal').style.display = 'none';
      toast('Transaction updated ✓', 'success');
      checkBudgetAlerts();
      render();
    }
    newSaveBtn.removeEventListener('click', saveHandler);
  });
}

document.getElementById('modalClose').addEventListener('click', () => document.getElementById('editModal').style.display = 'none');
document.getElementById('editModal').addEventListener('click', e => { if (e.target === document.getElementById('editModal')) document.getElementById('editModal').style.display = 'none'; });

function showAddModal() {
  editingId = null;
  document.getElementById('editTitle').value = '';
  document.getElementById('editAmount').value = '';
  document.getElementById('editCategory').value = 'Food';
  document.getElementById('editDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('editType').value = 'expense';
  document.getElementById('editModal').style.display = 'flex';
  document.querySelector('.modal-header h3').innerHTML = '<i class="fa-solid fa-plus-circle"></i> Add Transaction';
  document.getElementById('saveEditBtn').textContent = 'Add Transaction';
  
  const saveBtn = document.getElementById('saveEditBtn');
  const newSaveBtn = saveBtn.cloneNode(true);
  saveBtn.parentNode.replaceChild(newSaveBtn, saveBtn);
  
  newSaveBtn.addEventListener('click', function addHandler() {
    const title = document.getElementById('editTitle').value.trim();
    const amount = parseFloat(document.getElementById('editAmount').value);
    const category = document.getElementById('editCategory').value;
    const date = document.getElementById('editDate').value;
    const type = document.getElementById('editType').value;
    
    if (!title || isNaN(amount) || amount <= 0 || !date) { 
      toast('Please fill all fields correctly', 'error'); 
      return; 
    }
    
    transactions.unshift({ id: uid(), title, amount, category, date, type });
    save();
    document.getElementById('editModal').style.display = 'none';
    toast('Transaction added ✓', 'success');
    checkBudgetAlerts();
    render();
    newSaveBtn.removeEventListener('click', addHandler);
  });
}

  if (dateEl) dateEl.value = new Date().toISOString().split('T')[0];
  const btn = document.getElementById('qAddBtn');
  if (btn) btn.addEventListener('click', () => {
    const title = document.getElementById('qTitle')?.value.trim();
    const amount = parseFloat(document.getElementById('qAmount')?.value);
    const category = document.getElementById('qCategory')?.value;
    const date = document.getElementById('qDate')?.value;
    const type = document.getElementById('qType')?.value;

    const titleEl = document.getElementById('qTitle');
    const amountEl = document.getElementById('qAmount');

    transactions.unshift({ id: uid(), title, amount, category, date, type });

    toast(`${type === 'income' ? '💰' : '💸'} Transaction added!`, 'success');

function buildMonthlyData() {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const income = Array(12).fill(0), expense = Array(12).fill(0);
  transactions.forEach(t => {
    const m = new Date(t.date).getMonth();
    if (t.type === 'income') income[m] += t.amount;
    else expense[m] += t.amount;
  });
  const balance = income.map((v,i) => v - expense[i]);
  return { months, income, expense, balance };
}

function buildBarChart(data) {
  const ctx = document.getElementById('chartBar');
  if (!ctx || !ctx.getContext) return;
  const cc = chartColors();
  activeCharts.bar = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.months,
      datasets: [
        { label:'Income', data: data.income, backgroundColor: '#2563eb', borderRadius: 6, borderSkipped: false },
        { label:'Expenses', data: data.expense, backgroundColor: '#ef4444', borderRadius: 6, borderSkipped: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels:{ color: cc.text, font:{size:12} } } },
      scales: {
        x: { ticks:{ color: cc.text }, grid:{ color: cc.grid } },
        y: { ticks:{ color: cc.text, callback: v => currency+v }, grid:{ color: cc.grid } }
      }
    }
  });
}

function buildLineChart(data) {
  const ctx = document.getElementById('chartLine');
  if (!ctx || !ctx.getContext) return;
  const cc = chartColors();
  let cum = 0;
  const cumBal = data.balance.map(v => (cum += v));

    type: 'line',

          <div style="font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:800;color:var(--accent);margin-top:6px;">${fmt(kpis.savings)}</div>
        </div>
        <div style="text-align:center;padding:16px;background:var(--surface2);border-radius:var(--radius-sm);">
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;font-weight:700;">Savings Rate</div>
          <div style="font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:800;color:var(--purple);margin-top:6px;">${pct(kpis.savings,kpis.income)}%</div>
        </div>
      </div>
    </div>
  `;
}

function exportCSV() {
  const headers = ['Title','Amount','Category','Date','Type'];
  const rows = transactions.map(t => [t.title, t.amount, t.category, t.date, t.type]);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'aurum_transactions.csv';
  a.click();
  toast('CSV exported successfully!', 'success');
}

function exportJSON() {
  const dataStr = JSON.stringify(transactions, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'aurum_transactions.json';
  a.click();
  toast('JSON exported successfully!', 'success');
}

function printSummary() {
  window.print();
  toast('Opening print dialog...', 'info');
}

function updateDarkBtn() {
  const btn = document.getElementById('darkBtn');
  const txt = document.getElementById('darkBtnText');
  if (!btn) return;
  btn.querySelector('i').className = darkMode ? 'fas fa-sun' : 'fas fa-moon';
  if (txt) txt.textContent = darkMode ? 'Light' : 'Dark';
}

document.getElementById('darkBtn').addEventListener('click', () => {

  document.body.classList.toggle('dark', darkMode);
